<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedReminder - Bảng Điều Khiển Quản Trị</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- Glassmorphic Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center fw-bold fs-4 text-white" href="index.html">
                <i class="bi bi-capsule-therapeutic me-2 fs-3 text-info"></i> MedReminder <span
                    class="badge bg-danger ms-2" style="font-size: 0.65rem;">Admin</span>
            </a>
            <div class="ms-auto d-flex gap-2">
                <button type="button" id="btnSeedData"
                    class="btn btn-outline-info btn-sm d-flex align-items-center gap-2">
                    <i class="bi bi-database-fill-add"></i> Tạo Dữ Liệu Mẫu
                </button>
                <a href="index.html" class="btn btn-outline-light btn-sm d-flex align-items-center gap-2">
                    <i class="bi bi-arrow-left"></i> Trở về Trang Khách
                </a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row g-4">
            <!-- Cột trái: Form nhập liệu & Bảng quản lý -->
            <div class="col-lg-8">
                <!-- Card Form -->
                <div class="card border-0 shadow-sm p-4 mb-4 rounded-4 bg-white">
                    <h5 class="text-primary fw-bold mb-3 d-flex align-items-center gap-2">
                        <i class="bi bi-calendar-plus-fill"></i> Thêm hoặc Sửa Lịch Thuốc
                    </h5>
                    <form id="formNhap">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label-custom">Tên Bệnh Nhân <span
                                        class="text-danger">*</span></label>
                                <input type="text" id="nhapBenhNhan" class="form-control form-control-custom"
                                    placeholder="Nhập họ và tên bệnh nhân...">
                                <small id="loiBenhNhan" class="error-inline ps-1" style="display: none;"></small>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label-custom">Tên Thuốc <span class="text-danger">*</span></label>
                                <input type="text" id="nhapThuoc" class="form-control form-control-custom"
                                    placeholder="Nhập tên thuốc uống...">
                                <small id="loiThuoc" class="error-inline ps-1" style="display: none;"></small>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label-custom">Ngày Uống <span class="text-danger">*</span></label>
                                <input type="date" id="nhapNgay" class="form-control form-control-custom">
                                <small id="loiNgay" class="error-inline ps-1" style="display: none;"></small>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label-custom">Giờ Uống <span class="text-danger">*</span></label>
                                <input type="time" id="nhapGio" class="form-control form-control-custom">
                                <small id="loiGio" class="error-inline ps-1" style="display: none;"></small>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label-custom">Liều lượng (Viên) <span
                                        class="text-danger">*</span></label>
                                <input type="number" id="nhapLieu" class="form-control form-control-custom"
                                    placeholder="Ví dụ: 1, 2..." min="1">
                                <small id="loiLieu" class="error-inline ps-1" style="display: none;"></small>
                            </div>
                            <div class="col-12">
                                <label class="form-label-custom">Đường dẫn ảnh thuốc (Tùy chọn)</label>
                                <input type="text" id="nhapAnh" class="form-control form-control-custom"
                                    placeholder="http://... hoặc https://...">
                                <small id="loiAnh" class="error-inline ps-1" style="display: none;"></small>
                            </div>
                            <div class="col-12 text-end d-flex gap-2 justify-content-end mt-4">
                                <button type="button" id="btnHuySua" class="btn btn-light border px-4 py-2"
                                    style="display: none;">Hủy Chỉnh Sửa</button>
                                <button type="submit" id="btnLuu" class="btn btn-primary-custom px-4 py-2">Lưu Lịch
                                    Thuốc</button>
                            </div>
                        </div>
                    </form>
                </div>

                <!-- Danh sách Lịch uống (Bảng Table) -->
                <div class="card border-0 shadow-sm p-4 rounded-4 bg-white">
                    <h5 class="text-primary fw-bold mb-3 d-flex align-items-center gap-2">
                        <i class="bi bi-table"></i> Danh Sách Lịch Trình Uống Thuốc
                    </h5>
                    <div class="table-responsive admin-table-wrapper">
                        <table class="table admin-table align-middle">
                            <thead>
                                <tr>
                                    <th style="width: 35%;">Bệnh Nhân / Ngày</th>
                                    <th style="width: 25%;">Tên Thuốc / Liều</th>
                                    <th style="width: 15%;">Giờ</th>
                                    <th style="width: 15%;">Trạng thái</th>
                                    <th style="width: 10%;" class="text-end">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="bangLich">
                                <!-- Chèn từ JS -->
                            </tbody>
                        </table>
                    </div>

                    <!-- Bộ phân trang (Pagination) -->
                    <nav class="mt-4">
                        <ul class="pagination justify-content-center" id="phanTrang">
                            <!-- Chèn từ JS -->
                        </ul>
                    </nav>
                </div>
            </div>

            <!-- Cột phải: Bệnh nhân & Kho thuốc -->
            <div class="col-lg-4">
                <!-- Danh sách Bệnh Nhân -->
                <div class="card border-0 shadow-sm rounded-4 bg-white overflow-hidden mb-4">
                    <div
                        class="card-header bg-primary text-white py-3 fw-bold border-0 d-flex align-items-center gap-2">
                        <i class="bi bi-people-fill"></i> Danh Sách Bệnh Nhân
                    </div>
                    <ul class="list-group list-group-flush" id="dsBenhNhan">
                        <!-- Chèn từ JS -->
                    </ul>
                </div>

                <!-- Kho Thuốc -->
                <div class="card border-0 shadow-sm rounded-4 bg-white overflow-hidden">
                    <div
                        class="card-header bg-success text-white py-3 fw-bold border-0 d-flex align-items-center gap-2">
                        <i class="bi bi-prescription2"></i> Kho Thuốc Hệ Thống
                    </div>
                    <ul class="list-group list-group-flush" id="dsKhoThuoc">
                        <!-- Chèn từ JS -->
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Xác Nhận Xóa của Bootstrap 5 -->
    <div class="modal fade" id="modalXacNhanXoa" tabindex="-1" aria-labelledby="modalXoaTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow rounded-4">
                <div class="modal-header border-0 bg-danger text-white p-4">
                    <h5 class="modal-title fw-bold" id="modalXoaTitle"><i class="bi bi-trash me-2"></i> Xác Nhận Xóa
                        Lịch</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body p-4" id="modalXoaNoiDung">
                    Bạn có chắc chắn muốn xóa lịch uống thuốc này không? Hành động này không thể hoàn tác.
                </div>
                <div class="modal-footer border-0 p-4 pt-0">
                    <button type="button" class="btn btn-light border px-4 py-2" data-bs-dismiss="modal">Hủy bỏ</button>
                    <button type="button" class="btn btn-danger px-4 py-2" id="btnDongYXoa">Đồng ý xóa</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container"></div>

    <!-- Thư viện bắt buộc: jQuery & Bootstrap 5 JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Các file JavaScript phân rã -->
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
